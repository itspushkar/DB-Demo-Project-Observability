apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: default
  labels:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: my-otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
      app.kubernetes.io/instance: my-otel-demo
      component: standalone-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-collector
        app.kubernetes.io/instance: my-otel-demo
        component: standalone-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8889"   # 👈 tells Prometheus where to scrape
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.131.0
          args:
            - "--config=/conf/otel-collector-config.yaml"   # 👈 point to our ConfigMap file
          ports:
            - containerPort: 4317 # gRPC
            - containerPort: 4318 # HTTP
            - containerPort: 8889 # Prometheus exporter
          volumeMounts:
            - name: otel-collector-config-vol
              mountPath: /conf
      volumes:
        - name: otel-collector-config-vol
          configMap:
            name: otel-collector-config   # 👈 this must match the ConfigMap we created
