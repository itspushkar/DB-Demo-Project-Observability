apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-config
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-config-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-config-role-binding
subjects:
- kind: ServiceAccount
  name: otel-collector-config
  namespace: default
roleRef:
  kind: ClusterRole
  name: otel-collector-config-role
  apiGroup: rbac.authorization.k8s.io