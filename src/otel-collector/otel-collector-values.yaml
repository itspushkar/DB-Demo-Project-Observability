# otel-collector-values.yaml
mode: deployment
image:
  repository: otel/opentelemetry-collector
  tag: 0.90.1
config:
  receivers:
    otlp:
      protocols:
        grpc:
        http:
    prometheus:
      config:
        scrape_configs:
        - job_name: 'otel-collector'
          static_configs:
          - targets: ['0.0.0.0:8888']
  processors:
    batch:
  exporters:
    prometheus:
      endpoint: "0.0.0.0:9464"
    debug:
  service:
    pipelines:
      metrics:
        receivers: [otlp, prometheus]
        processors: [batch]
        exporters: [prometheus, debug]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]